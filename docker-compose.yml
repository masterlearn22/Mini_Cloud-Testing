# ============================================================
# docker-compose.yml — Mini-Cloud Environment
# UTS Cloud Computing — Simulasi IaaS, HA, Elasticity, CDN
# ============================================================
#
# CARA MENJALANKAN:
#   docker compose up --build -d
#
# CARA MEMATIKAN SATU NODE (simulasi fault tolerance):
#   docker compose stop web-node1
#
# CARA HORIZONTAL SCALING (tambah node):
#   docker compose up --scale web-node3=1 -d
#
# CARA MELIHAT LOG:
#   docker compose logs -f
# ============================================================

version: "3.9"

# ── Jaringan virtual internal (Isolated principle) ────────────
networks:
  cloud-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

# ── Volume persisten untuk Redis ──────────────────────────────
volumes:
  redis-data:

services:

  # ──────────────────────────────────────────────────────────
  # WORKER NODE 1 — IaaS Resource Provisioning
  # Konsep: Provisioning sumber daya komputasi via kontainer
  # ──────────────────────────────────────────────────────────
  web-node1:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: web-node1
    environment:
      NODE_ID  : "web-node1"
      PORT     : "3000"
      REDIS_URL: "redis://redis:6379"
    networks:
      - cloud-net
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Resource limits (simulasi quota cloud)
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ──────────────────────────────────────────────────────────
  # WORKER NODE 2 — IaaS Resource Provisioning (instance ke-2)
  # ──────────────────────────────────────────────────────────
  web-node2:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: web-node2
    environment:
      NODE_ID  : "web-node2"
      PORT     : "3000"
      REDIS_URL: "redis://redis:6379"
    networks:
      - cloud-net
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ──────────────────────────────────────────────────────────
  # WORKER NODE 3 — Elasticity (aktifkan saat scaling)
  # Cara aktifkan: docker compose up web-node3 -d
  # Lalu uncomment baris "server web-node3:3000" di nginx.conf
  # ──────────────────────────────────────────────────────────
  web-node3:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: web-node3
    environment:
      NODE_ID  : "web-node3"
      PORT     : "3000"
      REDIS_URL: "redis://redis:6379"
    networks:
      - cloud-net
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - scale   # Hanya aktif jika dijalankan dengan --profile scale
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ──────────────────────────────────────────────────────────
  # NGINX LOAD BALANCER — High Availability & Entry Point
  # Konsep: Democratic (satu entry point), Fault Tolerance
  # ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-lb
    ports:
      - "80:80"       # Load Balancer (API)
      - "8080:8080"   # CDN Layer (static content)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cdn-static:/usr/share/nginx/html:ro
      - ./cdn-static/assets:/usr/share/nginx/html/static:ro
    networks:
      - cloud-net
    depends_on:
      - web-node1
      - web-node2
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # REDIS — Caching Layer
  # Konsep: Meminimalkan beban backend, mempercepat response
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    command: redis-server --save 60 1 --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - cloud-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
