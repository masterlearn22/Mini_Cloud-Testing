# ============================================================
# nginx.conf — Load Balancer & CDN Layer
# Simulasi: High Availability, Load Balancing, Content Delivery
# ============================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Format log (untuk analisis distribusi request)
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    '"$upstream_addr" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;

    # ──────────────────────────────────────────────────────────
    # UPSTREAM: Definisi Worker Node Pool
    # Konsep: Resource Provisioning (IaaS) & Load Balancing
    # Algoritma: round-robin (default) — setiap request
    #            diarahkan bergantian ke node berikutnya
    # ──────────────────────────────────────────────────────────
    upstream worker_pool {
        # Round-robin load balancing
        server web-node1:3000;
        server web-node2:3000;
        # web-node3 ditambah saat horizontal scaling (elasticity)
        # server web-node3:3000;

        # Health check: tandai node DOWN jika gagal 2x, coba lagi 30 detik
        # (Fault Tolerance — pengguna tidak merasakan node mati)
    }

    # ──────────────────────────────────────────────────────────
    # CDN / Static Content Layer — port 8080
    # Konsep: Content Delivery, mempercepat distribusi file statis
    # ──────────────────────────────────────────────────────────
    server {
        listen 8080;
        server_name localhost;

        # Cache header untuk static assets (simulasi CDN TTL)
        location /static/ {
            alias /usr/share/nginx/html/assets/;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
            add_header X-Cache-Layer "CDN-Simulation";
            add_header X-Served-By   "nginx-cdn";
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }

    # ──────────────────────────────────────────────────────────
    # MAIN SERVER — port 80
    # Entry point tunggal (Democratic principle — semua akses sama)
    # ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Header tambahan untuk debugging distribusi beban
        add_header X-Load-Balancer "nginx-mini-cloud";

        # ── Proxy ke Worker Pool ───────────────────────────────
        location / {
            proxy_pass         http://worker_pool;
            proxy_http_version 1.1;

            # Teruskan informasi client asli
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Header debugging (node mana yang melayani)
            add_header         X-Upstream-Node   $upstream_addr;

            # Timeout (jika node tidak merespons, coba node lain)
            proxy_connect_timeout 3s;
            proxy_read_timeout    5s;

            # FAULT TOLERANCE: Jika node gagal, teruskan ke node berikutnya
            proxy_next_upstream error timeout http_502 http_503;
        }

        # ── Health check endpoint Load Balancer sendiri ────────
        location /lb-status {
            return 200 '{"status":"Load Balancer UP","upstream":"worker_pool"}';
            add_header Content-Type application/json;
        }
    }
}
